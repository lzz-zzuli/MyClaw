<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>两段式调用性能对比</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 40px;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }
        h1 {
            text-align: center;
            color: #fff;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        .subtitle {
            text-align: center;
            color: #95a5a6;
            font-size: 14px;
            margin-bottom: 40px;
            font-style: italic;
        }
        .chart {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            height: 350px;
            padding: 20px 0;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .bar-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .bars {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            height: 280px;
        }
        .bar {
            width: 50px;
            border-radius: 8px 8px 0 0;
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 8px;
        }
        .bar:hover {
            transform: scaleY(1.02);
            filter: brightness(1.1);
        }
        .bar.single {
            background: linear-gradient(180deg, #ff6b6b 0%, #ee5a5a 100%);
            box-shadow: 0 4px 15px rgba(255,107,107,0.4);
        }
        .bar.two {
            background: linear-gradient(180deg, #4ecdc4 0%, #45b7af 100%);
            box-shadow: 0 4px 15px rgba(78,205,196,0.4);
        }
        .bar-value {
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .improvement {
            background: linear-gradient(135deg, #ffe66d 0%, #f9d423 100%);
            color: #1a1a2e;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 13px;
            box-shadow: 0 4px 15px rgba(255,230,109,0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .label {
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            font-size: 14px;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        .legend-color.single { background: linear-gradient(180deg, #ff6b6b 0%, #ee5a5a 100%); }
        .legend-color.two { background: linear-gradient(180deg, #4ecdc4 0%, #45b7af 100%); }
        .conclusion {
            margin-top: 40px;
            padding: 20px;
            background: rgba(78,205,196,0.1);
            border-left: 4px solid #4ecdc4;
            border-radius: 0 10px 10px 0;
        }
        .conclusion p {
            color: #fff;
            font-size: 15px;
            line-height: 1.6;
        }
        .highlight {
            color: #4ecdc4;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔬 两段式调用 vs 单阶段调用 - 性能对比实验</h1>
        <p class="subtitle">基于 100 次对照实验数据 | MyClaw 核心创新</p>
        
        <div class="chart">
            <div class="bar-group">
                <div class="bars">
                    <div class="bar single" style="height: 140px;">
                        <span class="bar-value">50%</span>
                    </div>
                    <div class="bar two" style="height: 252px;">
                        <span class="bar-value">90%</span>
                    </div>
                </div>
                <div class="improvement">↑ +40%</div>
                <div class="label">工具调用准确率</div>
            </div>
            
            <div class="bar-group">
                <div class="bars">
                    <div class="bar single" style="height: 140px;">
                        <span class="bar-value">50%</span>
                    </div>
                    <div class="bar two" style="height: 28px;">
                        <span class="bar-value">10%</span>
                    </div>
                </div>
                <div class="improvement">↓ -80%</div>
                <div class="label">错误执行率</div>
            </div>
            
            <div class="bar-group">
                <div class="bars">
                    <div class="bar single" style="height: 75px;">
                        <span class="bar-value">19.3s</span>
                    </div>
                    <div class="bar two" style="height: 93px;">
                        <span class="bar-value">23.9s</span>
                    </div>
                </div>
                <div class="improvement">+23.5%</div>
                <div class="label">平均决策耗时</div>
            </div>
        </div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-color single"></div>
                <span>单阶段调用（传统方式）</span>
            </div>
            <div class="legend-item">
                <div class="legend-color two"></div>
                <span>两阶段调用（MyClaw 创新）</span>
            </div>
        </div>
        
        <div class="conclusion">
            <p>
                <span class="highlight">💡 实验结论：</span>
                两段式架构用 23.5% 的时间开销，换来了<strong>工具调用准确率提升 40%</strong>，
                <strong>错误执行率降低 80%</strong>。这个 trade-off 对于 AI 安全至关重要。
            </p>
        </div>
    </div>
</body>
</html>
